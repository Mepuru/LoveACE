name: Check macOS Notarization

on:
  workflow_dispatch:
    inputs:
      submission_id:
        description: Apple notarization submission id
        required: true
        type: string
      source_run_id:
        description: Build macOS Desktop run id containing the app zip artifact
        required: true
        type: string
      version:
        description: Desktop version, for example 1.1.4
        required: true
        type: string
      dry_run:
        description: Check, staple, package, and upload artifact only; do not publish OTA
        required: false
        default: true
        type: boolean
      changelog:
        description: Release changelog
        required: false
        default: ""
        type: string
      content:
        description: OTA dialog content
        required: false
        default: ""
        type: string
      force:
        description: Force OTA update
        required: false
        default: false
        type: boolean

jobs:
  check:
    runs-on: macos-latest
    environment: S3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Check notarization status
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
          SUBMISSION_ID: ${{ inputs.submission_id }}
        run: |
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          xcrun notarytool info "$SUBMISSION_ID" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --output-format json | tee notary-info.json

          STATUS=$(python3 -c "import json; print(json.load(open('notary-info.json'))['status'])")
          echo "Notary status: $STATUS"

          xcrun notarytool log "$SUBMISSION_ID" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" || true

          if [ "$STATUS" = "Invalid" ] || [ "$STATUS" = "Rejected" ]; then
            exit 1
          fi

          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization is not accepted yet; refusing to package or publish." >&2
            exit 1
          fi

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path('/tmp/loveace_developer_id.p12').write_bytes(
              base64.b64decode(os.environ['MACOS_CERTIFICATE_BASE64'])
          )
          PY

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/loveace_developer_id.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            build.keychain

          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "Developer ID Application certificate not found" >&2
            exit 1
          fi
          echo "Using signing identity: $CERT_IDENTITY"
          echo "CERT_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

      - name: Download build artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download "${{ inputs.source_run_id }}" \
            --repo "${{ github.repository }}" \
            --name "loveace-macos-${{ inputs.version }}" \
            --dir artifact
          ls -la artifact

      - name: Staple app and create signed DMG
        run: |
          VERSION="${{ inputs.version }}"
          APP_ZIP="artifact/loveace-$VERSION.app.zip"
          APP_DIR="notarized-app"
          APP_PATH="$APP_DIR/loveace.app"
          DMG_PATH="release/loveace-$VERSION.dmg"

          mkdir -p "$APP_DIR" release
          ditto -x -k "$APP_ZIP" "$APP_DIR"

          xcrun stapler staple "$APP_PATH"
          spctl --assess --type execute --verbose "$APP_PATH"

          brew install create-dmg
          create-dmg \
            --volname "彩带小工具" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "loveace.app" 150 185 \
            --hide-extension "loveace.app" \
            --app-drop-link 450 185 \
            "$DMG_PATH" \
            "$APP_PATH" || true

          if [ ! -f "$DMG_PATH" ]; then
            hdiutil create -volname "彩带小工具" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          fi

          codesign --force --timestamp --sign "$CERT_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

      - name: Upload stapled DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: loveace-macos-${{ inputs.version }}-stapled
          path: release/loveace-${{ inputs.version }}.dmg

      - name: Set up uv
        if: ${{ inputs.dry_run == false }}
        uses: astral-sh/setup-uv@v5

      - name: Publish macOS release
        if: ${{ inputs.dry_run == false }}
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          uv run python cli.py release \
            --version "${{ inputs.version }}" \
            --platform macos \
            --file "../../../release/loveace-${{ inputs.version }}.dmg" \
            --content "${{ inputs.content }}" \
            --changelog "${{ inputs.changelog }}" \
            ${{ inputs.force && '--force' || '' }}
        working-directory: android/tools/publish
