name: Update Analytics Stats Card

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: analytics-worker/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: analytics-worker

      - name: Generate stats card
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: npm run stats:card
        working-directory: analytics-worker

      - name: Commit stats card
        run: |
          if git diff --quiet -- assets/analytics-stats.svg; then
            echo "Stats card unchanged"
            exit 0
          fi
          git add assets/analytics-stats.svg
          git \
            -c user.name="github-actions[bot]" \
            -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "docs: update analytics stats card"
          git push
