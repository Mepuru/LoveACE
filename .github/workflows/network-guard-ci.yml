name: network-guard-ci

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Manifest download URL mode
        required: true
        default: cloudflare
        type: choice
        options:
          - cloudflare
          - edgeone
      dry_run:
        description: Preview changes without uploading manifest
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: loveace-manifest
  cancel-in-progress: false

jobs:
  switch-network:
    runs-on: ubuntu-latest
    environment: S3

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Switch manifest network mode
        env:
          S3_ENDPOINT: ${{ secrets.S3_ENDPOINT }}
          S3_ACCESS_KEY: ${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY: ${{ secrets.S3_SECRET_KEY }}
          S3_BUCKET: ${{ secrets.S3_BUCKET }}
          S3_REGION: ${{ secrets.S3_REGION }}
          CDN_BASE_URL: ${{ secrets.CDN_BASE_URL }}
        run: |
          uv run python cli.py network-guard \
            --mode "${{ inputs.mode }}" \
            ${{ inputs.dry_run && '--dry-run' || '' }}
        working-directory: android/tools/publish
