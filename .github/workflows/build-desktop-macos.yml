name: Build macOS Desktop

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Build only; do not publish OTA or GitHub Release assets
        required: false
        default: true
        type: boolean

jobs:
  build:
    runs-on: macos-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    defaults:
      run:
        working-directory: desktop

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Read desktop version
        id: version
        run: |
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          text = Path('pubspec.yaml').read_text()
          match = re.search(r'^version:\s*([0-9]+\.[0-9]+\.[0-9]+)', text, re.MULTILINE)
          if not match:
              raise SystemExit('Cannot read version from desktop/pubspec.yaml')

          version = match.group(1)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as output:
              output.write(f'version={version}\n')
              output.write(f'artifact_name=loveace-macos-{version}\n')
          print(f'Desktop version: {version}')
          PY

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze desktop project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Import Developer ID certificate
        env:
          MACOS_CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path('/tmp/loveace_developer_id.p12').write_bytes(
              base64.b64decode(os.environ['MACOS_CERTIFICATE_BASE64'])
          )
          PY

          security create-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$MACOS_KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/loveace_developer_id.p12 \
            -k build.keychain \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$MACOS_KEYCHAIN_PASSWORD" \
            build.keychain
          security find-identity -v -p codesigning build.keychain

      - name: Prepare App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_P8: ${{ secrets.APP_STORE_CONNECT_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$APP_STORE_CONNECT_API_KEY_P8" > "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"
          chmod 600 "$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

      - name: Configure Developer ID signing
        run: |
          CERT_IDENTITY=$(security find-identity -v -p codesigning build.keychain | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          if [ -z "$CERT_IDENTITY" ]; then
            echo "Developer ID Application certificate not found" >&2
            exit 1
          fi
          echo "Using signing identity: $CERT_IDENTITY"
          echo "CERT_IDENTITY=$CERT_IDENTITY" >> "$GITHUB_ENV"

          python3 - <<'PY'
          import os
          from pathlib import Path

          path = Path('macos/Runner.xcodeproj/project.pbxproj')
          text = path.read_text()
          text = text.replace('CODE_SIGN_STYLE = Automatic;', 'CODE_SIGN_STYLE = Manual;')
          text = text.replace('"CODE_SIGN_IDENTITY[sdk=macosx*]" = "Apple Development";', f'"CODE_SIGN_IDENTITY[sdk=macosx*]" = "{os.environ["CERT_IDENTITY"]}";')
          text = text.replace('DEVELOPMENT_TEAM = 2PYK4BY5P6;', 'DEVELOPMENT_TEAM = "${{ secrets.APPLE_TEAM_ID }}";')
          text = text.replace('PROVISIONING_PROFILE_SPECIFIER = "";', 'PROVISIONING_PROFILE_SPECIFIER = "";')
          path.write_text(text)
          PY

      - name: Build macOS release
        run: flutter build macos --release

      - name: Sign app bundle with Developer ID
        run: |
          APP_PATH="build/macos/Build/Products/Release/loveace.app"
          ENTITLEMENTS="macos/Runner/Release.entitlements"

          while IFS= read -r item; do
            codesign --force --timestamp --options runtime --sign "$CERT_IDENTITY" "$item"
          done < <(find "$APP_PATH" \( -name "*.framework" -o -name "*.dylib" \))
          codesign --force --timestamp --options runtime --entitlements "$ENTITLEMENTS" --sign "$CERT_IDENTITY" "$APP_PATH"
          codesign --verify --deep --strict --verbose=2 "$APP_PATH"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_PATH="build/macos/Build/Products/Release/loveace.app"
          DMG_PATH="build/macos/loveace-$VERSION.dmg"

          create-dmg \
            --volname "彩带小工具" \
            --volicon "$APP_PATH/Contents/Resources/AppIcon.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "loveace.app" 150 185 \
            --hide-extension "loveace.app" \
            --app-drop-link 450 185 \
            "$DMG_PATH" \
            "$APP_PATH" || true

          if [ ! -f "$DMG_PATH" ]; then
            hdiutil create -volname "彩带小工具" -srcfolder "$APP_PATH" -ov -format UDZO "$DMG_PATH"
          fi

      - name: Sign and notarize DMG
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_API_ISSUER_ID }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="build/macos/loveace-$VERSION.dmg"
          KEY_PATH="$HOME/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8"

          codesign --force --timestamp --sign "$CERT_IDENTITY" "$DMG_PATH"
          codesign --verify --verbose=2 "$DMG_PATH"

          xcrun notarytool submit "$DMG_PATH" \
            --key "$KEY_PATH" \
            --key-id "$APP_STORE_CONNECT_API_KEY_ID" \
            --issuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --wait

          xcrun stapler staple "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: desktop/build/macos/loveace-${{ steps.version.outputs.version }}.dmg

      - name: Confirm dry run
        run: |
          echo "Dry run: ${{ inputs.dry_run }}"
          echo "OTA/manifest publishing is disabled in this workflow."
