name: 通用 Issue
description: 不确定分类时使用这个模板
title: ""
labels: ["status: triage"]
body:
  - type: markdown
    attributes:
      value: |
        如果你的问题不适合“问题反馈”或“功能建议”，可以使用这个通用模板。

        ⚠️ 请不要在 issue 中提交账号、密码、Cookie、Token、身份证号、手机号等敏感信息。

  - type: textarea
    id: content
    attributes:
      label: 内容
      description: 请描述你想反馈、讨论或记录的事项。
      placeholder: 请尽量说明背景、现象、期望或相关上下文。
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 相关平台
      multiple: true
      options:
        - Android
        - iOS
        - macOS
        - Windows
        - Web
        - 全平台
        - 不确定
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可以添加截图、参考链接或其他说明；请先打码敏感信息。
    validations:
      required: false
