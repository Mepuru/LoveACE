services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: loveace_analytics
      POSTGRES_USER: loveace
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loveace -d loveace_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  analytics-api:
    image: loveace-analytics-api:latest
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "127.0.0.1:7788:8000"

volumes:
  postgres-data:
